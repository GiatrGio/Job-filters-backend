# fly.toml — LinkedIn Job Filter backend
# Run `fly launch --no-deploy` once to claim the app name, then `fly deploy`.

app = "linkedin-job-filter-backend"
primary_region = "fra"  # Close to Supabase EU — change if your Supabase project lives elsewhere.

[build]

[env]
  PORT = "8080"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
